version: '3.8'

services:
  uams-db:
    image: mysql:8.0
    container_name: uams-mysql
    restart: always
    environment:
      MYSQL_DATABASE: UAMS
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Ubuntu@143}
    ports:
      - "3307:3306"
    volumes:
      - uams-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  uams-backend:
    build: .
    container_name: uams-app
    restart: always
    ports:
      - "8081:8080"
    environment:
      - DB_URL=jdbc:mysql://uams-db:3306/UAMS?useSSL=false&allowPublicKeyRetrieval=true
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-Ubuntu@143}
      - JWT_SECRET=${JWT_SECRET:-uams-super-secret-jwt-key-for-hs512-algorithm-must-be-64-chars-long!!}
    depends_on:
      uams-db:
        condition: service_healthy

volumes:
  uams-db-data:
