spring.application.name=UAMS

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/UAMS?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Ubuntu@143
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# ?? JPA / Hibernate ???????????????????????????????????????????????????????????
# Use 'create' on first run to generate tables, then switch to 'update'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?? Jackson ???????????????????????????????????????????????????????????????????
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.date-format=yyyy-MM-dd

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.org.springframework.security=DEBUG
logging.level.com.example.uams=DEBUG

# ?? JWT ???????????????????????????????????????????????????????????????????????
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ?? Springdoc / Swagger ???????????????????????????????????????????????????????
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ?? Springdoc extra ???????????????????????????????????????????????????????????
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false
springdoc.swagger-ui.disable-swagger-default-url=true